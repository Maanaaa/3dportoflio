<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musée Immersif 3D</title>
    <style>
        :root {
            --accent-pink: #ff2e88;
            --bg-dark: #020202;
            --panel-bg: #111111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        #musee-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            z-index: 1;
            background: #000;
        }

        /* Style de base des popups */
        .musee-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg);
            border: 1px solid var(--accent-pink);
            border-radius: 8px;
            color: white;
            font-family: sans-serif;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 46, 136, 0.2);
            z-index: 1000;
        }

        /* Instructions de départ */
        #instructions {
            width: 300px;
            padding: 30px;
        }

        #instructions h3 {
            color: var(--accent-pink);
            text-transform: uppercase;
            margin-top: 0;
        }

        #instructions p {
            margin: 15px 0;
            line-height: 1.6;
            font-size: 14px;
        }

        #project-popup {
            position: fixed;
            z-index: 10000;
            display: none;
            border: 2px solid #ff2e88;
            background: #000;
            margin: 0;
            padding: 0;
        }

        #popup-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Boutons */
        .btn-primary {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background: #ff0073;
            box-shadow: 0 0 15px var(--accent-pink);
        }

        #close-popup {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 40px;
            height: 40px;
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: 0.2s;
        }

        #close-popup:hover {
            background: #ff0073;
            box-shadow: 0 0 15px rgba(255, 46, 136, 0.5);
        }

        /* Menu de navigation */
        #popup-menu {
            position: absolute;
            top: -45px;
            left: 0;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .nav-btn {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: #ff0073;
            box-shadow: 0 0 10px rgba(255, 46, 136, 0.6);
        }
    </style>
</head>
<body>
    <div id="musee-container">
        
        <div id="instructions" class="musee-popup">
            <h3 style="color: #ff2e88;">Commandes</h3>
            <p><strong>ZQSD</strong> : Déplacement<br><strong>SOURIS</strong> : Vue<br><strong>CLIC</strong> : Voir le projet</p>
            <button id="start-button" class="btn-primary">Entrer</button>
        </div>

        <div id="project-popup" class="musee-popup" style="display: none;">
            <button id="close-popup">×</button>
            
            <!-- Menu de sélection -->
            <div id="popup-menu" style="position: absolute; top: -45px; left: 0; display: flex; gap: 10px; z-index: 10;">
                <button class="nav-btn" data-type="site">SITE</button>
                <button class="nav-btn" data-type="image">IMAGE</button>
                <button class="nav-btn" data-type="video">VIDÉO</button>
            </div>

            <!-- Iframe masquée par défaut (opacity: 0) -->
            <iframe id="popup-iframe" src="" style="width:100%; height:100%; border:none; background: #000; opacity: 0; transition: opacity 0.5s;"></iframe>
        </div>

    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./musee-immersif.js"></script>
</body>
</html>
